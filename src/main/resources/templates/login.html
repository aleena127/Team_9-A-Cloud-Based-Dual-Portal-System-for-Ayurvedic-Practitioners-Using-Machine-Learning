<!-- login.html  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AyurSutra | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-image: url('/images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 350px; 
            text-align: center; 
        }
        h2 { 
            font-family: 'Playfair Display', serif; 
            color: #6b8e23; 
            margin-bottom: 30px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        button { 
            background: #6b8e23; 
            color: white; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            margin-top: 10px; 
            transition: background 0.3s; 
        }
        button:hover { 
            background: #55721c; 
        }
        .error-message { 
            color: #d9534f; 
            margin-top: 15px; 
            font-size: 0.9em; 
            display: none; 
        }
        .signup-link { 
            margin-top: 20px; 
            font-size: 0.9em; 
            color: #555; 
        }
        .signup-link a { 
            color: #6b8e23; 
            text-decoration: none; 
            font-weight: 600; 
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>AyurSutra</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Enter Portal</button>
        </form>
        
        <div class="signup-link">
            New user? <a href="/signup">Create an account</a>
        </div>

        <div id="errorMessage" class="error-message">Invalid username or password.</div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            // Hide error message on new attempt
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                // Parse the response as JSON to match our backend map
                const data = await response.json();
                
                if (data.role !== "INVALID") {
                    // Save info to local storage
                    localStorage.setItem('userRole', data.role);
                    if (data.username) {
                        localStorage.setItem('username', data.username);
                    }
                    
                    // Route to the correct Thymeleaf dashboard based on role
                    if (data.role === "ADMIN") {
                        window.location.href = "/admin-dashboard";
                    } else if (data.role === "DOCTOR") {
                        window.location.href = "/doctor-dashboard";
                    } else if (data.role === "PATIENT") {
                        window.location.href = "/patient-dashboard";
                    }
                } else {
                    // Show our custom error text
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error("Login failed:", error);
                alert("Server connection error. Is Spring Boot running?");
            }
        };
    </script>
</body>
</html>
