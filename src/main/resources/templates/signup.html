<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AyurSutra | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --dark-forest: #2d3e30; --primary-sage: #6b8e23; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-image: url('/images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h2 { font-family: 'Playfair Display', serif; color: var(--primary-sage); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary-sage); color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: background 0.3s;}
        button:hover { background: #55721c; }
        .login-link { margin-top: 20px; display: block; font-size: 14px; color: #666; text-decoration: none; }
        .login-link:hover { color: var(--primary-sage); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Join AyurSutra</h2>
        <form id="signupForm">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="DOCTOR">Doctor</option>
                <option value="PATIENT">Patient</option>
                <option value="ADMIN">Admin</option>
            </select>
            <button type="submit">Create Account</button>
        </form>
        <a href="/login" class="login-link">Already have an account? Login</a>
    </div>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            
            try {
                const res = await fetch('/api/clients', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if(res.ok) { 
                    alert("Account Created Successfully!"); 
                    // Redirect back to the login route!
                    window.location.href="/login"; 
                } else {
                    alert("Registration failed. Please try again.");
                }
            } catch (err) {
                alert("Network error. Is your Spring Boot app running?");
            }
        };
    </script>
</body>
</html>
